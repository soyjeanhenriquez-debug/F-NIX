<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Fénix</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root{
    --bg:#0a0a0a; --card:#151515; --border:#262626;
    --orange:#ff5a1f; --orange-dim:#7a3016;
    --text:#f2f2f2; --sub:#9a9a9a; --green:#3ecf7a; --red:#ff5252;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  header{padding:20px 20px 0;}
  .title{font-size:1.6rem;font-weight:800;}
  .title span{color:var(--orange);}
  .subtitle{color:var(--sub);font-size:0.95rem;margin-top:4px;display:flex;align-items:center;gap:8px;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;}
  .tabs{display:flex;gap:4px;overflow-x:auto;margin-top:18px;border-bottom:1px solid var(--border);padding:0 20px;}
  .tab{padding:10px 14px;color:var(--sub);font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-size:0.95rem;}
  .tab.active{color:var(--orange);border-color:var(--orange);}
  main{padding:20px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .card .label{color:var(--sub);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.04em;}
  .card .value{font-size:1.9rem;font-weight:800;margin-top:6px;}
  .card .sub{color:var(--sub);font-size:0.82rem;margin-top:4px;}
  .value.orange{color:var(--orange);}
  .value.green{color:var(--green);}
  .value.red{color:var(--red);}
  .bar-bg{height:6px;background:#262626;border-radius:3px;margin-top:8px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--orange);}
  .section-title{font-size:1.1rem;font-weight:700;margin:24px 0 12px;}
  .entry{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
  .entry-top{display:flex;justify-content:space-between;align-items:baseline;}
  .entry-date{font-weight:700;color:var(--orange);font-size:0.9rem;}
  .entry-meta{color:var(--sub);font-size:0.8rem;}
  .entry-body{margin-top:6px;font-size:0.92rem;line-height:1.4;}
  .macro-row{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
  .macro{font-size:0.82rem;color:var(--sub);}
  .macro b{color:var(--text);}
  .chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:12px;}
  .loading{color:var(--sub);text-align:center;padding:40px;}
  .day-badge{display:inline-block;background:var(--orange-dim);color:var(--orange);border-radius:6px;padding:2px 8px;font-size:0.75rem;font-weight:700;margin-left:8px;}
  ::-webkit-scrollbar{height:0;}
  #fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:var(--orange);color:#fff;font-size:2rem;border:none;box-shadow:0 4px 16px rgba(255,90,31,0.5);cursor:pointer;z-index:50;line-height:1;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--card);border-top:2px solid var(--orange);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px;}
  .modal-tabs{display:flex;gap:6px;margin-bottom:16px;}
  .mtab{flex:1;text-align:center;padding:10px;background:#0a0a0a;border-radius:10px;color:var(--sub);font-weight:600;cursor:pointer;}
  .mtab.active{background:var(--orange);color:#fff;}
  .mform label{display:block;color:var(--sub);font-size:0.8rem;margin:10px 0 4px;}
  .mform input,.mform select{width:100%;padding:12px;background:#0a0a0a;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;}
  .mform textarea{width:100%;padding:12px;background:#0a0a0a;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;font-family:inherit;resize:vertical;}
  .calc-btn{width:100%;padding:12px;background:var(--card);color:var(--orange);border:1px solid var(--orange);border-radius:10px;font-weight:700;margin-top:10px;cursor:pointer;font-size:0.95rem;}
  .desglose{font-size:0.8rem;color:var(--sub);margin-top:10px;line-height:1.5;}
  .desglose-total{color:var(--text);font-weight:700;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .hint{color:var(--green);font-size:0.82rem;margin-top:6px;min-height:1rem;}
  .save-btn{width:100%;padding:15px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-size:1.05rem;font-weight:700;margin-top:18px;cursor:pointer;}
  .close-btn{width:100%;padding:12px;background:transparent;color:var(--sub);border:none;margin-top:8px;cursor:pointer;}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:12px 24px;border-radius:24px;font-weight:700;opacity:0;transition:opacity 0.3s;z-index:200;pointer-events:none;}
  .toast.show{opacity:1;}
  .ex-row{padding:12px 0;border-bottom:1px solid var(--border);}
  .ex-row:last-child{border-bottom:none;}
  .ex-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .ex-name{font-weight:700;font-size:0.98rem;}
  .ex-load{color:var(--text);font-size:0.9rem;white-space:nowrap;font-variant-numeric:tabular-nums;}
  .prog{display:inline-block;margin-top:5px;font-size:0.8rem;font-weight:700;padding:2px 8px;border-radius:6px;font-variant-numeric:tabular-nums;}
  .prog.up{background:rgba(62,207,122,0.15);color:var(--green);}
  .prog.down{background:rgba(255,82,82,0.15);color:var(--red);}
  .prog.same{background:#262626;color:var(--sub);}
  .prog.new{background:var(--orange-dim);color:var(--orange);}
  .ex-note{color:var(--sub);font-size:0.8rem;margin-top:5px;line-height:1.35;}
  .ex-num{display:inline-block;background:var(--orange-dim);color:var(--orange);font-size:0.72rem;font-weight:800;padding:1px 6px;border-radius:5px;margin-right:7px;}
  .ex-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
  .obj{display:inline-block;font-size:0.78rem;font-weight:700;padding:2px 8px;border-radius:6px;}
  .obj.ok{background:rgba(62,207,122,0.12);color:var(--green);}
  .obj.bajo{background:rgba(255,180,0,0.12);color:#ffb400;}
  .cardio-block{margin-top:12px;padding-top:10px;border-top:1px dashed var(--border);}
  .cardio-title{font-size:0.82rem;font-weight:700;color:var(--sub);margin-bottom:5px;}
  .protocolo{background:linear-gradient(135deg,rgba(255,90,31,0.12),rgba(255,90,31,0.03));border:1px solid var(--orange-dim);border-radius:14px;padding:14px 16px;margin-bottom:8px;}
  .protocolo.rest{background:linear-gradient(135deg,rgba(62,207,122,0.1),rgba(62,207,122,0.02));border-color:rgba(62,207,122,0.3);}
  .proto-head{font-weight:800;font-size:1rem;margin-bottom:6px;}
  .proto-line{font-size:0.86rem;color:var(--sub);margin-top:4px;line-height:1.35;}
  .proto-tap{float:right;font-size:0.78rem;color:var(--orange);font-weight:700;}
  .core-extra{background:rgba(255,90,31,0.08);border-radius:10px;padding:10px 12px;margin:8px 0;}
  .core-extra-h{font-size:0.82rem;font-weight:700;color:var(--orange);margin-bottom:6px;}
  .core-extra-item{font-size:0.83rem;color:var(--sub);line-height:1.45;margin-top:3px;}
  .core-extra-item b{color:var(--text);}
  .dia-panel{padding-bottom:20px;}
  .dia-panel-head{display:flex;justify-content:space-between;align-items:center;font-size:1.15rem;font-weight:800;margin:8px 0 16px;}
  .dia-close{background:var(--card);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:1rem;cursor:pointer;}
  .dia-ex{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
  .dia-ex-top{display:flex;justify-content:space-between;align-items:center;}
  .dia-ex-name{font-weight:700;font-size:0.98rem;}
  .dia-ex-grp{font-size:0.72rem;color:var(--sub);text-transform:uppercase;letter-spacing:0.04em;}
  .dia-ex-specs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .spec{font-size:0.82rem;padding:3px 9px;border-radius:7px;background:#0a0a0a;color:var(--sub);font-weight:600;}
  .spec.sug{background:var(--orange-dim);color:var(--orange);}
  .spec.mejora{background:rgba(62,207,122,0.15);color:var(--green);}
  .spec.new{background:rgba(255,180,0,0.12);color:#ffb400;}
  .spec.desc{background:rgba(120,120,255,0.12);color:#9a9aff;}
  .dia-cardio-note{margin-top:14px;padding:12px;background:#0a0a0a;border-radius:10px;font-size:0.84rem;color:var(--sub);}
  #ptr{position:fixed;top:-50px;left:50%;transform:translateX(-50%);width:40px;height:40px;border-radius:50%;background:var(--card);border:1px solid var(--orange);color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:1.3rem;z-index:80;opacity:0;transition:opacity 0.15s;}
  #ptr.spin{animation:ptrspin 0.7s linear infinite;}
  @keyframes ptrspin{from{transform:translateX(-50%) rotate(0)}to{transform:translateX(-50%) rotate(360deg)}}
  .daytype{font-size:0.68rem;background:#0a0a0a;color:var(--sub);padding:2px 7px;border-radius:5px;margin-left:6px;font-weight:700;letter-spacing:0.03em;}
  .cal-badge{font-size:0.82rem;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;}
  .cal-badge.ok{background:rgba(62,207,122,0.15);color:var(--green);}
  .cal-badge.ambar{background:rgba(255,180,0,0.15);color:#ffb400;}
  .cal-badge.rojo{background:rgba(255,82,82,0.18);color:var(--red);}
  .prot-line{font-size:0.85rem;color:var(--sub);margin:8px 0 4px;}
  .guia-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
  .guia-h{font-weight:800;font-size:1rem;margin-bottom:10px;}
  .guia-ul{margin:0;padding-left:18px;}
  .guia-ul li{font-size:0.88rem;color:var(--sub);line-height:1.55;margin-bottom:4px;}
  .guia-ul li b{color:var(--text);}
  .entry.score-ok{border-left:3px solid var(--green);}
  .entry.score-ambar{border-left:3px solid #ffb400;}
  .entry.score-rojo{border-left:3px solid var(--red);}
  .score-badge{font-size:0.78rem;font-weight:800;padding:4px 10px;border-radius:8px;white-space:nowrap;}
  .score-badge.ok{background:rgba(62,207,122,0.18);color:var(--green);}
  .score-badge.ambar{background:rgba(255,180,0,0.18);color:#ffb400;}
  .score-badge.rojo{background:rgba(255,82,82,0.2);color:var(--red);}
  .score-detail{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
  .chk{font-size:0.78rem;font-weight:600;padding:2px 8px;border-radius:6px;background:#0a0a0a;}
  .chk.y{color:var(--green);}
  .chk.n{color:var(--red);}
  .faltan{background:rgba(255,180,0,0.12);color:#ffb400;font-size:0.82rem;font-weight:600;padding:8px 10px;border-radius:8px;margin-bottom:8px;}
  .com-faltan{font-size:0.85rem;color:var(--sub);margin-bottom:10px;min-height:1rem;}
  .pill-falta{display:inline-block;background:var(--orange-dim);color:var(--orange);padding:3px 10px;border-radius:12px;font-weight:700;cursor:pointer;margin:2px;}
  .reco-header{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
  .reco-title{font-weight:800;font-size:0.95rem;margin-bottom:8px;}
  .reco-item{display:flex;gap:8px;font-size:0.85rem;color:var(--sub);line-height:1.4;margin-top:6px;}
  .reco-item span:first-child{flex-shrink:0;}
  .foto-banner{display:flex;gap:10px;align-items:center;background:linear-gradient(135deg,rgba(255,90,31,0.18),rgba(255,90,31,0.05));border:1px solid var(--orange);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:0.9rem;line-height:1.4;}
  .foto-banner span:first-child{font-size:1.3rem;}
  .agua-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
  .agua-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .agua-label{font-weight:700;}
  .agua-val{font-weight:800;font-size:1.2rem;}
  .agua-btns{display:flex;gap:8px;margin-top:12px;}
  .agua-btns button{flex:1;padding:11px 0;background:#0a0a0a;border:1px solid var(--orange);color:var(--orange);border-radius:9px;font-weight:700;font-size:0.9rem;cursor:pointer;}
  .agua-btns button.agua-menos{border-color:var(--border);color:var(--sub);flex:0.7;}
  .hipo-card{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
  .hipo-card.done{border-color:var(--green);}
  .hipo-title{font-weight:700;}
  .hipo-sub{font-size:0.8rem;color:var(--sub);margin-top:3px;}
  .hipo-btn{padding:10px 18px;background:#0a0a0a;border:1px solid var(--orange);color:var(--orange);border-radius:9px;font-weight:700;cursor:pointer;white-space:nowrap;}
  .hipo-btn.on{background:var(--green);border-color:var(--green);color:#000;}
  .lista-dia-head{font-weight:800;font-size:1.05rem;margin:6px 0 12px;color:var(--orange);}
  .dia-descanso{background:rgba(62,207,122,0.1);color:var(--green);padding:12px;border-radius:10px;margin-bottom:12px;font-size:0.88rem;line-height:1.4;}
  .lde{background:#0a0a0a;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;}
  .lde.done{border-color:var(--green);opacity:0.7;}
  .lde-name{font-weight:700;font-size:0.94rem;}
  .lde-check{color:var(--green);font-weight:800;}
  .lde-meta{font-size:0.78rem;color:var(--sub);margin:5px 0 8px;}
  .lde-inputs{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;}
  .lde-inputs input{padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;width:100%;}
  .lde-save{padding:10px 16px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap;}
</style>
</head>
<body>

<header>
  <div class="title">PROYECTO <span>FÉNIX</span> 🔥</div>
  <div class="subtitle"><span class="live-dot"></span><span id="dayCounter">Cargando...</span></div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="dashboard">Dashboard</div>
  <div class="tab" data-tab="entrenamientos">Entrenamientos</div>
  <div class="tab" data-tab="nutricion">Nutrición</div>
  <div class="tab" data-tab="progreso">Progreso</div>
  <div class="tab" data-tab="guia">Guía</div>
</div>

<main id="app"><div class="loading">Cargando datos de Supabase...</div></main>

<button id="fab" onclick="openModal()">+</button>

<div id="modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-tabs">
      <div class="mtab active" data-mtab="ej">Ejercicio</div>
      <div class="mtab" data-mtab="com">Comida</div>
      <div class="mtab" data-mtab="dia">Día</div>
    </div>

    <div class="mform" id="form-ej">
      <label>Fecha</label><input type="date" id="ej-fecha" onchange="renderListaDia()">
      <div id="ej-dia-lista"></div>
    </div>

    <div class="mform" id="form-com" style="display:none">
      <div id="com-faltan" class="com-faltan"></div>
      <label>Fecha</label><input type="date" id="com-fecha">
      <label>Momento</label>
      <select id="com-momento">
        <option>Desayuno</option><option>Almuerzo</option><option>Snack</option><option>Cena</option>
      </select>
      <label>Comida (una línea por alimento con gramos)</label>
      <textarea id="com-comida" rows="4" placeholder="batata 150g&#10;pollo plancha 150g&#10;aguacate 100g&#10;agua 2L"></textarea>
      <button class="calc-btn" onclick="calcularMacros()">🔢 Calcular macros</button>
      <div id="com-desglose" class="desglose"></div>
      <div class="row2">
        <div><label>Calorías</label><input type="number" id="com-cal"></div>
        <div><label>Proteína (g)</label><input type="number" id="com-prot"></div>
      </div>
      <div class="row2">
        <div><label>Carbos (g)</label><input type="number" id="com-carb"></div>
        <div><label>Grasas (g)</label><input type="number" id="com-gra"></div>
      </div>
      <button class="save-btn" onclick="saveCom()">Guardar comida</button>
    </div>

    <div class="mform" id="form-dia" style="display:none">
      <label>Fecha</label><input type="date" id="dia-fecha">
      <div class="row2">
        <div><label>Peso (lb)</label><input type="number" id="dia-peso" step="0.1"></div>
        <div><label>Agua (L)</label><input type="number" id="dia-agua" step="0.1"></div>
      </div>
      <div class="row2">
        <div><label>Proteína total (g)</label><input type="number" id="dia-prot"></div>
        <div><label>Calorías</label><input type="number" id="dia-cal"></div>
      </div>
      <label>Notas</label><input type="text" id="dia-notas" placeholder="opcional">
      <button class="save-btn" onclick="saveDia()">Guardar día</button>
    </div>

    <button class="close-btn" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = "https://rgfcfjcltqtaujrfwxla.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnZmNmamNsdHF0YXVqcmZ3eGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2Njg0NzgsImV4cCI6MjA5ODI0NDQ3OH0.e8P8y5rMYArxXkI53h-2FQs5P_PJmUhO1gznTBp_pwo";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PROJECT_START = new Date("2026-06-30T00:00:00");
const BASELINE_LB = 235.9; // peso inicio, 22 jun, ya en libras
const META_LB = 198.4;     // 90kg convertido a lb

// ---- RUTINA OFICIAL RENFIT (Mes 1) — orden + rango reps objetivo ----
// clave normalizada del ejercicio -> {orden, dia, grupo, reps, series}
const RENFIT = {
  // DIA 1 - Pecho + Triceps
  'press banco plano smith':{d:1,o:1,g:'Pecho',reps:'8',series:4},
  'press plano smith':{d:1,o:1,g:'Pecho',reps:'8',series:4},
  'prensa inclinado maquina':{d:1,o:2,g:'Pecho',reps:'12',series:4},
  'press inclinado maquina':{d:1,o:2,g:'Pecho',reps:'12',series:4},
  'fly maquina':{d:1,o:3,g:'Pecho',reps:'12-15',series:3},
  'press declinado maquina':{d:1,o:4,g:'Pecho',reps:'8',series:3},
  'extensiones barra triceps':{d:1,o:5,g:'Triceps',reps:'12',series:3},
  'extensiones soga triceps':{d:1,o:6,g:'Triceps',reps:'12-15',series:3},
  // DIA 2 - Espalda + Biceps
  'jalon al pecho supino maquina':{d:2,o:1,g:'Espalda',reps:'8-10',series:4},
  'jalon al pecho agarre supino':{d:2,o:1,g:'Espalda',reps:'8-10',series:4},
  'jalon cerrado neutro maquina':{d:2,o:2,g:'Espalda',reps:'8-10',series:4},
  'jalon polea baja supino':{d:2,o:3,g:'Espalda',reps:'10-12',series:3},
  'jalon polea baja agarre supino':{d:2,o:3,g:'Espalda',reps:'10-12',series:3},
  'jalon banquillo mancuernas':{d:2,o:4,g:'Espalda',reps:'12-15',series:3},
  'curls maquina':{d:2,o:5,g:'Biceps',reps:'12-15',series:3},
  'curls biceps maquina':{d:2,o:5,g:'Biceps',reps:'12-15',series:3},

// parsea texto multilinea -> {cal,prot,carb,gra, agua, lineas:[...]}
function parseComida(texto){
  const res = {cal:0,prot:0,carb:0,gra:0,agua:0,lineas:[],desconocidos:[]};
  texto.split(/[\n,]/).forEach(raw => {
    const linea = raw.trim(); if(!linea) return;
    const nlinea = normEj(linea);
    // agua (litros)
    const mAgua = nlinea.match(/agua.*?([\d.]+)\s*l/) || nlinea.match(/([\d.]+)\s*l.*agua/);
    if(nlinea.includes('agua') && mAgua){ res.agua += parseFloat(mAgua[1]); res.lineas.push(`💧 ${linea}`); return; }
    // gramos
    const mG = nlinea.match(/([\d.]+)\s*g/);
    // unidades (ej "2 huevos", "1.5 scoops")
    const mU = nlinea.match(/([\d.]+)\s*(huevo|huevos|scoop|scoops)/);
    // encontrar alimento por match mas largo
    let found=null, key='';
    for(const k of Object.keys(ALIMENTOS)){ if(nlinea.includes(k) && k.length>key.length){ key=k; found=ALIMENTOS[k]; } }
    if(!found){ res.desconocidos.push(linea); res.lineas.push(`❓ ${linea}`); return; }
    let cal,pr,ca,gr;
    const keyU = mU ? normEj(mU[2]).replace(/s$/,'') : null;
    if(mU && (keyU==='huevo'||keyU==='scoop')){
      const n = parseFloat(mU[1]);
      const base = keyU==='huevo' ? ALIMENTOS['huevo'] : ALIMENTOS['scoop'];
      cal=base[0]*n; pr=base[1]*n; ca=base[2]*n; gr=base[3]*n;
    } else if(mG){
      const g = parseFloat(mG[1])/100;
      cal=found[0]*g; pr=found[1]*g; ca=found[2]*g; gr=found[3]*g;
    } else {
      res.desconocidos.push(linea); res.lineas.push(`❓ ${linea} (sin cantidad)`); return;
    }
    res.cal+=cal; res.prot+=pr; res.carb+=ca; res.gra+=gr;
    res.lineas.push(`✓ ${linea} → ${Math.round(cal)}kcal ${Math.round(pr)}g prot`);
  });
  return res;
}

function abrirDiaHoy(dow){

    .reduce((acc,[k,v])=>{ // dedupe por orden (hay alias)
      if(!acc.find(x=>x.o===v.o)) acc.push({nombre:k,...v});
      return acc;
    },[])

    </div>`;

  ejsDelDia.forEach(ej => {
    // ultimo peso registrado de este ejercicio (por cualquier alias)
    const hist = state.ejercicios
      .filter(e => renfitInfo(e.ejercicio) && renfitInfo(e.ejercicio).o===ej.o && renfitInfo(e.ejercicio).d===ej.d && e.peso)
      .sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const ultimo = hist.length ? hist[0] : null;
    const sug = ultimo ? Math.round(ultimo.peso * 1.05 * 2)/2 : null;
    const mejora = ultimo ? '+5%' : '—';

    const nombreCap = ej.nombre.replace(/\b\w/g, c=>c.toUpperCase());
    html += `<div class="dia-ex">
      <div class="dia-ex-top">
        <span class="dia-ex-name"><span class="ex-num">#${ej.o}</span>${nombreCap}</span>
        <span class="dia-ex-grp">${ej.g}</span>

        <span class="spec">${ej.series}×${ej.reps} reps</span>
        <span class="spec desc">⏱ ${descansoRenfit(ej.nombre)}</span>
        ${ultimo ? `<span class="spec">último: ${fmt(ultimo.peso)} lb</span>` : ''}
        ${sug ? `<span class="spec sug">objetivo hoy: ${sug} lb</span>` : `<span class="spec new">primera vez — calibrar</span>`}
        ${ultimo ? `<span class="spec mejora">${mejora}</span>` : ''}
      </div>
    </div>`;
  });

  const retoADow = {1:1,2:2,3:3,4:5,5:6}; // diaReto -> dia semana
  html += coreHoy(retoADow[diaReto]);
  html += `<div class="dia-cardio-note">🏃 Recuerda: cardio al terminar las pesas (ver arriba en el dashboard)</div>`;
  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

function renderDashboard(){
  const diasConPeso = state.dias.filter(d => d.peso !== null);
  const pesoActual = diasConPeso.length ? diasConPeso[diasConPeso.length-1].peso : null;
  const bajadaTotal = pesoActual !== null ? (BASELINE_LB - pesoActual) : null;
  const RETO_START = '2026-06-30';
  const diasReto = state.dias.filter(d => d.fecha >= RETO_START).length;
  const diasPre = state.dias.filter(d => d.fecha < RETO_START).length;
  const diaActual = daysSinceStart();
  const proteinas = state.dias.filter(d => d.proteina !== null).map(d => d.proteina);
  const proteinaProm = proteinas.length ? proteinas.reduce((a,b)=>a+b,0)/proteinas.length : null;
  const aguas = state.dias.filter(d => d.agua !== null).map(d => d.agua);
  const aguaProm = aguas.length ? aguas.reduce((a,b)=>a+b,0)/aguas.length : null;

function renderEntrenamientos(){
  const byDate = {};
  state.ejercicios.forEach(e => {
    if(!byDate[e.fecha]) byDate[e.fecha] = [];
    byDate[e.fecha].push(e);
  });
  const allDates = new Set([...Object.keys(byDate), ...state.dias.map(d=>d.fecha)]);
  const dates = [...allDates].sort().reverse();

  function prevPeso(nombre, fecha){
    const hist = state.ejercicios
      .filter(e => normEj(e.ejercicio)===normEj(nombre) && e.peso && e.fecha < fecha)
      .sort((a,b)=>b.fecha.localeCompare(a.fecha));
    return hist.length ? hist[0] : null;
  }

  let html = `<div class="section-title">Entrenamientos</div>`;
  dates.forEach(fecha => {
    const diaLog = state.dias.find(d => d.fecha === fecha);
    const items = byDate[fecha] || [];
    // separar pesas de cardio/descanso
    const pesas = items.filter(e => !esCardio(e.ejercicio));
    const cardio = items.filter(e => esCardio(e.ejercicio));
    // ordenar pesas por indice Renfit (los que no matchean van al final)
    pesas.sort((a,b)=>{
      const ra=renfitInfo(a.ejercicio), rb=renfitInfo(b.ejercicio);
      if(ra&&rb) return ra.o-rb.o;
      if(ra) return -1; if(rb) return 1; return 0;
    });
    const diaReto = pesas.length && renfitInfo(pesas[0].ejercicio) ? renfitInfo(pesas[0].ejercicio).d : null;

    html += `<div class="entry"><div class="entry-date">${fecha}`;
    if(!pesas.length) html += `<span class="day-badge">DESCANSO / CARDIO</span>`;
    else if(diaReto) html += `<span class="day-badge">DÍA ${diaReto}</span>`;
    html += `</div>`;

    pesas.forEach(e => {
      const rf = renfitInfo(e.ejercicio);
      let prog = '';
      if(e.peso){
        const prev = prevPeso(e.ejercicio, fecha);
        if(prev){
          const diff = e.peso - prev.peso;
          const pct = ((diff / prev.peso) * 100);
          let cls = diff>0?'up':(diff<0?'down':'same');
          let arrow = diff>0?'▲':(diff<0?'▼':'=');
          prog = `<span class="prog ${cls}">${arrow} ${diff>0?'+':''}${fmt(diff)} lb (${pct>0?'+':''}${fmt(pct,0)}%)</span>`;
        } else prog = `<span class="prog new">nuevo</span>`;
      }
      // rango objetivo vs real
      let objetivo = '';
      if(rf){
        const cumple = repEnRango(e.reps, rf.reps);
        objetivo = `<span class="obj ${cumple?'ok':'bajo'}">obj: ${rf.reps} reps</span>`;
      }
      const num = rf ? `<span class="ex-num">#${rf.o}</span>` : '';
      html += `<div class="ex-row">
        <div class="ex-head">
          <span class="ex-name">${num}${e.ejercicio}</span>
          <span class="ex-load">${e.series}×${e.reps}${e.peso?' · '+fmt(e.peso)+' lb':''}</span>
        </div>
        <div class="ex-tags">${prog}${objetivo}</div>
        ${e.notas?`<div class="ex-note">${e.notas}</div>`:''}
      </div>`;
    });

    if(cardio.length){
      html += `<div class="cardio-block"><div class="cardio-title">🏃 Cardio / Actividad</div>`;
      cardio.forEach(c => {
        html += `<div class="ex-note" style="color:var(--text)"><b>${c.ejercicio}</b>${c.notas?' — '+c.notas:''}</div>`;
      });
      html += `</div>`;
    }

    if(diaLog && diaLog.notas){
      html += `<div class="entry-body" style="margin-top:10px;color:var(--sub);">${diaLog.notas}</div>`;
    }
    if(!pesas.length && !cardio.length && !(diaLog&&diaLog.notas)){
      html += `<div class="macro">Sin actividad registrada</div>`;
    }
    html += `</div>`;
  });
  document.getElementById('app').innerHTML = html || '<div class="loading">Sin entrenamientos registrados</div>';
}

// ¿las reps reales caen dentro del rango objetivo?
function repEnRango(real, rango){
  const r = parseInt(real);
  if(isNaN(r)) return true;
  if(rango.includes('-')){
    const [lo,hi] = rango.split('-').map(x=>parseInt(x));
    return r >= lo;
  }
  return r >= parseInt(rango);
}

function renderNutricion(){
  const byDate = {};
  state.comidas.forEach(c => {
    if(!byDate[c.fecha]) byDate[c.fecha] = [];
    byDate[c.fecha].push(c);
  });
  const dates = Object.keys(byDate).sort().reverse();
  const diasConPesas = new Set(state.ejercicios.filter(e=>!esCardio(e.ejercicio)).map(e=>e.fecha));
  const diasConCardio = new Set(state.ejercicios.filter(e=>esCardio(e.ejercicio)).map(e=>e.fecha));
  const diasConNota = new Set(state.dias.filter(d=>d.notas).map(d=>d.fecha));
  const ordenMomento = {desayuno:1,almuerzo:2,comida:2,snack:3,cena:4,merienda:3};

  let html = `<div class="section-title">Nutrición</div>`;
  dates.forEach(fecha => {
    const items = byDate[fecha].slice().sort((a,b)=>{
      const oa=ordenMomento[a.momento.toLowerCase()]||9, ob=ordenMomento[b.momento.toLowerCase()]||9;
      return oa-ob;
    });
    const totalCal = items.reduce((s,i)=>s+(Number(i.calorias)||0),0);
    const totalProt = items.reduce((s,i)=>s+(Number(i.proteina)||0),0);
    const esGym = diasConPesas.has(fecha);
    const techo = esGym ? 1700 : 1400;
    const hizoEjercicio = esGym || diasConCardio.has(fecha) || diasConNota.has(fecha);

    // --- SCORE DEL DIA (3 criterios) ---
    let pts=0;
    const cProt = totalProt >= 150; if(cProt) pts++;
    const cCal = totalCal>0 && totalCal <= techo; if(cCal) pts++;
    const cEj = hizoEjercicio; if(cEj) pts++;
    let sc = pts>=3?'ok':(pts===2?'ambar':'rojo');
    let scTxt = pts>=3?'DÍA BUENO':(pts===2?'MÁS O MENOS':'DÍA MALO');

    // --- checklist de comidas faltantes ---
    const momentosHechos = new Set(items.map(i=>i.momento.toLowerCase()));
    const faltan = ['desayuno','almuerzo','cena'].filter(m=>!momentosHechos.has(m) && !(m==='almuerzo'&&momentosHechos.has('comida')));

    html += `<div class="entry score-${sc}">
      <div class="entry-top">
        <div class="entry-date">${fecha} <span class="daytype">${esGym?'GYM':(hizoEjercicio?'ACTIVO':'SIN EJERCICIO')}</span></div>
        <div class="score-badge ${sc}">${scTxt}</div>
      </div>
      <div class="score-detail">
        <span class="chk ${cEj?'y':'n'}">${cEj?'✓':'✗'} Ejercicio</span>
        <span class="chk ${cProt?'y':'n'}">${cProt?'✓':'✗'} Proteína ${fmt(totalProt,0)}g</span>
        <span class="chk ${cCal?'y':'n'}">${cCal?'✓':'✗'} ${fmt(totalCal,0)}/${techo} kcal</span>
      </div>`;
    if(faltan.length){
      html += `<div class="faltan">⚠️ Falta registrar: ${faltan.join(', ')}</div>`;
    }
    items.forEach(c => {
      html += `<div class="entry-body"><b>${c.momento}:</b> ${c.comida}</div>`;
      html += `<div class="macro-row">
        <span class="macro">Cal: <b>${fmt(c.calorias,0)}</b></span>
        <span class="macro">Prot: <b>${fmt(c.proteina,0)}g</b></span>
        <span class="macro">Carb: <b>${c.carbos!==null?fmt(c.carbos,0)+'g':'—'}</b></span>
        <span class="macro">Grasa: <b>${c.grasas!==null?fmt(c.grasas,0)+'g':'—'}</b></span>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('app').innerHTML = html || '<div class="loading">Sin comidas registradas</div>';
}

function renderProgreso(){
  let html = `<div class="section-title">Medidas Corporales (in / lb)</div>`;
  if(!state.medidas.length){
    html += '<div class="loading">Sin medidas registradas</div>';
  } else {
    state.medidas.forEach((m,i) => {
      const prev = state.medidas[i-1];
      const delta = (key) => {
        if(!prev || prev[key] === null || m[key] === null) return '';
        const d = m[key] - prev[key];
        if(Math.abs(d) < 0.05) return '';
        const color = d < 0 ? 'green' : 'red';
        return ` <span class="macro" style="color:var(--${color})">${d>0?'+':''}${fmt(d)}</span>`;
      };
      html += `<div class="entry">
        <div class="entry-date">${m.fecha}</div>
        <div class="macro-row">
          <span class="macro">Peso: <b>${fmt(m.peso)} lb</b>${delta('peso')}</span>
          <span class="macro">Grasa: <b>${fmt(m.grasa_corporal)}%</b>${delta('grasa_corporal')}</span>
          <span class="macro">Masa Magra: <b>${fmt(m.masa_magra)} lb</b>${delta('masa_magra')}</span>
        </div>
        <div class="macro-row">
          <span class="macro">Cintura: <b>${fmt(m.cintura)}"</b>${delta('cintura')}</span>
          <span class="macro">Pecho: <b>${fmt(m.pecho)}"</b>${delta('pecho')}</span>
          <span class="macro">Glúteos: <b>${fmt(m.gluteos)}"</b>${delta('gluteos')}</span>
        </div>
        <div class="macro-row">
          <span class="macro">Bíceps I/D: <b>${fmt(m.biceps_izq)}"/${fmt(m.biceps_der)}"</b></span>
          <span class="macro">Muslo I/D: <b>${fmt(m.muslo_izq)}"/${fmt(m.muslo_der)}"</b></span>
        </div>
        ${m.notas ? `<div class="macro" style="margin-top:6px;">${m.notas}</div>` : ''}
      </div>`;
    });
  }
  document.getElementById('app').innerHTML = html;
}

// mapea fecha -> dia de reto segun dia de semana
function diaRetoDeFecha(fechaStr){
  const d = new Date(fechaStr+'T12:00:00').getDay();
  return {1:1,2:2,3:3,5:4,6:5}[d] || null;
}

// lista fija de ejercicios del dia, en orden, con series precargadas
function renderListaDia(){
  const fecha = document.getElementById('ej-fecha').value;
  const diaReto = diaRetoDeFecha(fecha);
  const cont = document.getElementById('ej-dia-lista');
  if(!diaReto){
    cont.innerHTML = `<div class="dia-descanso">Día de descanso activo — no hay rutina de pesas.<br>Registra cardio/actividad abajo:</div>
      <label>Actividad</label><input type="text" id="ej-libre-nombre" placeholder="ej: Caminata playa, Boxeo 5min">
      <label>Notas</label><input type="text" id="ej-libre-notas" placeholder="tiempo, distancia, bpm">
      <button class="save-btn" onclick="saveLibre()">Guardar actividad</button>`;
    return;
  }
  // ejercicios oficiales del dia, dedup por orden
  const ejs = Object.entries(RENFIT).filter(([k,v])=>v.d===diaReto)
    .reduce((acc,[k,v])=>{ if(!acc.find(x=>x.o===v.o)) acc.push({nombre:k,...v}); return acc; },[])
    .sort((a,b)=>a.o-b.o);
  const nombreDia = {1:'Día 1 — Pecho + Tríceps',2:'Día 2 — Espalda + Bíceps',3:'Día 3 — Pierna Completa',4:'Día 4 — Brazos + Hombros',5:'Día 5 — Tren Inferior'}[diaReto];

  // ya registrados hoy (para marcar check)
  const yaHoy = new Set(state.ejercicios.filter(e=>e.fecha===fecha && renfitInfo(e.ejercicio)).map(e=>renfitInfo(e.ejercicio).o+'-'+renfitInfo(e.ejercicio).d));

  let html = `<div class="lista-dia-head">${nombreDia}</div>`;
  ejs.forEach(ej => {
    const nombreCap = ej.nombre.replace(/\b\w/g,c=>c.toUpperCase());
    // ultimo peso + sugerido
    const hist = state.ejercicios.filter(e=>renfitInfo(e.ejercicio)&&renfitInfo(e.ejercicio).o===ej.o&&renfitInfo(e.ejercicio).d===ej.d&&e.peso).sort((a,b)=>b.fecha.localeCompare(a.fecha));
    const ult = hist.length?hist[0].peso:null;
    const sug = ult?Math.round(ult*1.05*2)/2:null;
    const hecho = yaHoy.has(ej.o+'-'+ej.d);
    html += `<div class="lde ${hecho?'done':''}" data-o="${ej.o}" data-d="${ej.d}" data-nombre="${nombreCap}" data-series="${ej.series}">
      <div class="lde-top">
        <span class="lde-name"><span class="ex-num">#${ej.o}</span>${nombreCap} ${hecho?'<span class="lde-check">✓</span>':''}</span>
      </div>
      <div class="lde-meta">${ej.series}×${ej.reps} obj · ⏱${descansoRenfit(ej.nombre)}${ult?` · últ: ${fmt(ult)}lb`:''}${sug?` · <b style="color:var(--orange)">meta: ${sug}lb</b>`:' · calibrar'}</div>
      <div class="lde-inputs">
        <input type="number" class="lde-reps" placeholder="reps" value="${parseInt(ej.reps)||''}">
        <input type="number" class="lde-peso" step="0.5" placeholder="${sug||'peso'} lb">
        <button class="lde-save" onclick="saveEjLista(this)">Guardar</button>
      </div>
    </div>`;
  });
  cont.innerHTML = html;
}

async function saveEjLista(btn){
  const row = btn.closest('.lde');
  const reps = parseInt(row.querySelector('.lde-reps').value);
  const peso = parseFloat(row.querySelector('.lde-peso').value);
  if(!reps || !peso){ showToast('Falta reps o peso'); return; }
  const data = {
    fecha: document.getElementById('ej-fecha').value,
    ejercicio: row.dataset.nombre,
    series: parseInt(row.dataset.series),
    reps, peso, notas: null
  };
  const {error} = await sb.from('fenix_ejercicios').insert(data);
  if(error){ showToast('Error: '+error.message); return; }
  await loadAll();
  row.classList.add('done');
  row.querySelector('.lde-name').insertAdjacentHTML('beforeend',' <span class="lde-check">✓</span>');
  showToast(`${data.ejercicio} guardado ✓`);
}

async function saveLibre(){
  const nombre = document.getElementById('ej-libre-nombre').value.trim();
  const notas = document.getElementById('ej-libre-notas').value.trim();
  if(!nombre){ showToast('Falta la actividad'); return; }

  if(error){ showToast('Error: '+error.message); return; }
  document.getElementById('ej-libre-nombre').value='';
  document.getElementById('ej-libre-notas').value='';

// muestra en el form de comida que momentos faltan HOY
function actualizarFaltanHoy(){
  const hoy = todayStr();
  const hechos = new Set(state.comidas.filter(c=>c.fecha===hoy).map(c=>c.momento.toLowerCase()));
  const base = ['desayuno','almuerzo','cena'];
  const faltan = base.filter(m=>!hechos.has(m) && !(m==='almuerzo'&&hechos.has('comida')));
  const el = document.getElementById('com-faltan');
  if(!el) return;
  if(faltan.length){
    el.innerHTML = `Hoy falta: ${faltan.map(f=>`<span class="pill-falta" onclick="setMomento('${f}')">${f}</span>`).join(' ')}`;
  } else {
    el.innerHTML = `<span style="color:var(--green)">✓ Desayuno, almuerzo y cena registrados hoy</span>`;
  }
}
function setMomento(m){
  const sel = document.getElementById('com-momento');
  const cap = m.charAt(0).toUpperCase()+m.slice(1);
  for(const opt of sel.options){ if(opt.value.toLowerCase()===m){ sel.value=opt.value; break; } }
}

// calcula macros desde el texto de la comida y llena los campos
function calcularMacros(){
  const texto = document.getElementById('com-comida').value;
  if(!texto.trim()){ showToast('Escribe la comida primero'); return; }
  const r = parseComida(texto);
  document.getElementById('com-cal').value = Math.round(r.cal);
  document.getElementById('com-prot').value = Math.round(r.prot);
  document.getElementById('com-carb').value = Math.round(r.carb);
  document.getElementById('com-gra').value = Math.round(r.gra);
  let html = r.lineas.map(l=>`<div>${l}</div>`).join('');
  if(r.agua>0) html += `<div style="color:var(--orange);margin-top:4px">💧 ${r.agua}L de agua → guárdala en la pestaña "Día"</div>`;
  if(r.desconocidos.length) html += `<div style="color:#ffb400;margin-top:4px">⚠️ No reconocí: ${r.desconocidos.join(', ')} — mete sus macros a mano o ajusta</div>`;
  html += `<div class="desglose-total">Total: ${Math.round(r.cal)} kcal · ${Math.round(r.prot)}g prot · ${Math.round(r.carb)}g carb · ${Math.round(r.gra)}g grasa</div>`;
  document.getElementById('com-desglose').innerHTML = html;
}

function showToast(msg){
  const t = document.getElementById('toast');

async function saveCom(){
  const fecha = document.getElementById('com-fecha').value;
  const momento = document.getElementById('com-momento').value;
  const row = {
    fecha, momento,
    comida: document.getElementById('com-comida').value.trim(),
    calorias: parseFloat(document.getElementById('com-cal').value)||null,
    proteina: parseFloat(document.getElementById('com-prot').value)||null,
    carbos: parseFloat(document.getElementById('com-carb').value)||null,
    grasas: parseFloat(document.getElementById('com-gra').value)||null
  };
  if(!row.comida){ showToast('Falta la comida'); return; }
  // anti-duplicado: ya existe ese momento ese dia?
  const existente = state.comidas.find(c => c.fecha===fecha && c.momento.toLowerCase()===momento.toLowerCase());
  if(existente){
    const corregir = confirm(`Ya hay un ${momento} registrado ese día:\n"${existente.comida}"\n\nAceptar = CORREGIR (reemplazar por el nuevo)\nCancelar = es comida adicional (agregar aparte)`);
    if(corregir){
      const {error} = await sb.from('fenix_comidas').update(row).eq('id', existente.id);
      if(error){ showToast('Error: '+error.message); return; }
      ['com-comida','com-cal','com-prot','com-carb','com-gra'].forEach(id=>document.getElementById(id).value='');
      await loadAll(); actualizarFaltanHoy(); showToast('Comida corregida ✓'); return;
    }
  }
  const {error} = await sb.from('fenix_comidas').insert(row);
  if(error){ showToast('Error: '+error.message); return; }
  ['com-comida','com-cal','com-prot','com-carb','com-gra'].forEach(id=>document.getElementById(id).value='');
  await loadAll(); actualizarFaltanHoy(); showToast('Comida guardada ✓');
}

async function saveDia(){
  const row = {
    fecha: document.getElementById('dia-fecha').value,
    peso: parseFloat(document.getElementById('dia-peso').value)||null,

  };

  ['dia-peso','dia-agua','dia-prot','dia-cal','dia-notas'].forEach(id=>document.getElementById(id).value='');
  await loadAll(); showToast('Día guardado ✓');
}

async function init(){

}

// ---- PULL TO REFRESH ----
function currentTab(){
  const active = document.querySelector('.tab.active');
  return active ? active.dataset.tab : 'dashboard';
}
function setupPullToRefresh(){
  let startY = 0, pulling = false;
  const ind = document.createElement('div');
  ind.id = 'ptr'; ind.textContent = '↻';
  document.body.appendChild(ind);

  window.addEventListener('touchstart', e => {
    if(window.scrollY <= 0){ startY = e.touches[0].clientY; pulling = true; }
  }, {passive:true});

  window.addEventListener('touchmove', e => {
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0 && window.scrollY <= 0){
      const pull = Math.min(dy, 90);
      ind.style.top = (pull - 50) + 'px';
      ind.style.opacity = pull/90;
      ind.style.transform = `rotate(${pull*4}deg)`;
    }
  }, {passive:true});

  window.addEventListener('touchend', async e => {
    if(!pulling){ return; }
    const dy = (e.changedTouches[0].clientY - startY);
    pulling = false;
    if(dy > 70 && window.scrollY <= 0){
      ind.classList.add('spin');
      ind.style.top = '20px'; ind.style.opacity = 1;
      await loadAll();
      renderers[currentTab()]();
      showToast('Actualizado ✓');
      ind.classList.remove('spin');
    }
    ind.style.top = '-50px'; ind.style.opacity = 0;
  }, {passive:true});
}
init();
